"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Runs when Conductor creates a workspace. Flesh out .conductor/setup.sh per project.
setup = "bash .conductor/setup.sh"
# ai-setup post-generation customization (tune-conductor): this repo is workspace-isolable —
# hermetic tests (temp dirs + overridden $HOME), no server/ports/DB — so concurrent is safe.
run_mode = "concurrent"

# ai-setup post-generation customization (tune-conductor): real run scripts for this Bun CLI repo.
[scripts.run.test]
command = "bun test"
icon = "flask-conical"

[scripts.run.lint]
command = "bun run lint"
icon = "check"
