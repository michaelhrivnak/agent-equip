"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Runs when Conductor creates a workspace. Flesh out .conductor/setup.sh per project.
setup = "bash .conductor/setup.sh"
# Safe default: workspaces run one at a time. Opt up to "concurrent" via the tune-conductor
# skill once you've confirmed parallel workspaces can't collide (ports, DB, shared files).
run_mode = "nonconcurrent"

# Add run scripts as needed, e.g.:
# [scripts.run.dev]
# command = "your dev server --port $CONDUCTOR_PORT"
# default = true
# icon = "play"
